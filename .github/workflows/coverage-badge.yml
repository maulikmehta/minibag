name: Coverage Badge

on:
  push:
    branches: [main, master]
  workflow_run:
    workflows: ["Tests and Coverage"]
    types: [completed]
    branches: [main, master]

jobs:
  update-badge:
    name: Update Coverage Badge
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: ./packages/minibag

      - name: Generate coverage
        run: npm run test:coverage
        working-directory: ./packages/minibag

      - name: Extract coverage percentage
        id: coverage
        run: |
          COVERAGE=$(cat ./packages/minibag/coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE%"

      - name: Create coverage badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: minibag-coverage.json
          label: Coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          valColorRange: ${{ steps.coverage.outputs.percentage }}
          maxColorRange: 90
          minColorRange: 50

      - name: Comment coverage on commit
        if: github.event_name == 'push'
        uses: peter-evans/commit-comment@v3
        with:
          body: |
            ## 📊 Coverage Report

            **Total Coverage:** ${{ steps.coverage.outputs.percentage }}%

            View full coverage report in the [workflow artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
